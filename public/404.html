<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Impacgo Solutions</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrites, so a deep link or refresh on
      // any route other than "/" hits this 404 page. It re-encodes the path
      // into a query string and redirects to index.html, which decodes it
      // back (see the script in index.html) so React Router can take over.
      var pathSegmentsToKeep = 1; // "/impacgo/" is one path segment

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1 + pathSegmentsToKeep).split('/').join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
